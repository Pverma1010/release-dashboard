<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Release QA Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0b1020;--panel:#ffffff;--panel2:#f1f5f9;--line:#e2e8f0;
  --txt:#1e293b;--muted:#64748b;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --blue:#3b82f6;--violet:#8b5cf6;--cyan:#06b6d4;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f6f8fc,#eef2f7);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:1280px;margin:0 auto;padding:28px 22px 60px}
header.top{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:22px}
h1{font-size:26px;margin:0 0 4px}
.sub{color:var(--muted);font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.pill.ok{background:rgba(34,197,94,.15);color:#15803d}
.pill.bad{background:rgba(239,68,68,.15);color:#b91c1c}
.pill.warn{background:rgba(245,158,11,.15);color:#b45309}
.pill.info{background:rgba(59,130,246,.15);color:#1d4ed8}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);text-decoration:none;
  padding:8px 12px;border-radius:9px;font-size:12.5px;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.btn:hover{border-color:#94a3b8}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
.kpi .big{font-size:30px;font-weight:700;margin-top:4px}
.kpi .lbl{color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.04em}
.section-title{font-size:18px;margin:30px 0 12px;display:flex;align-items:center;gap:10px}
.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}
.build-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.build-name{font-weight:700;font-size:15px}
.muted{color:var(--muted);font-size:12px}
.chart-box{position:relative;height:200px;margin:6px 0}
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut{position:relative;width:150px;height:150px;flex:0 0 150px}
.donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .center .pct{font-size:26px;font-weight:800}
.donut .center .cl{font-size:10.5px;color:var(--muted);text-transform:uppercase}
.legend{font-size:12.5px;line-height:1.8}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--muted);font-weight:600}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.err{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#334155;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.stab{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.stab .b{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.stab .b .n{font-size:18px;font-weight:700}
.stab .b .t{font-size:10.5px;color:var(--muted);text-transform:uppercase}
.linkline{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.percy-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.diffgal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px}
.diffcell{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;text-decoration:none;color:var(--txt);display:flex;flex-direction:column}
.diffcell:hover{border-color:#94a3b8}
.diffcell .thumb{width:100%;aspect-ratio:9/16;object-fit:cover;object-position:top;background:#f1f5f9;display:block}
.diffcell .cap{padding:6px 8px;font-size:10.5px;line-height:1.3}
.diffcell .cap .nm{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.diffcell .cap .rt{color:var(--amber);font-weight:700}
.diffcell .nodiff{aspect-ratio:9/16;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center;padding:8px}
.newbadge{background:rgba(139,92,246,.2);color:#6d28d9;border-radius:6px;padding:1px 5px;font-size:9.5px}
.lightbox{position:fixed;inset:0;background:rgba(2,6,18,.92);display:none;align-items:center;justify-content:center;z-index:50;padding:24px;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:96vw;max-height:92vh;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.notice{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:#92400e}
.footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
a.inline{color:#1d4ed8}
.copyok{color:#15803d;font-size:11px;margin-left:6px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Release QA Dashboard - <span id="rel"></span></h1>
      <div class="sub" id="meta"></div>
    </div>
    <div class="btns" id="topbtns"></div>
  </header>

  <div class="grid kpis" id="kpis"></div>

  <div class="section-title">QA - Sanity (iOS &amp; Android)</div>
  <div class="grid cols" id="qa"></div>

  <div class="section-title">UAT - Smoke (regional rollup by platform)</div>
  <div class="grid cols" id="uat"></div>

  <div class="section-title">Percy - Visual Testing</div>
  <div id="percy"></div>

  <div class="footer" id="footer"></div>
</div>

const C = {green:'#22c55e',red:'#ef4444',amber:'#f59e0b',blue:'#3b82f6',violet:'#8b5cf6',cyan:'#06b6d4',slate:'#64748b'};
const PALETTE = ['#3b82f6','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#14b8a6','#eab308'];

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function fmtDur(s){if(!s)return '-';const h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h?`${h}h ${m}m`:`${m}m`;}
function copy(t){navigator.clipboard.writeText(t);}

function donut(canvas,passed,failed,other){
  new Chart(canvas,{type:'doughnut',data:{labels:['Passed','Failed','Other'],
    datasets:[{data:[passed,failed,other],backgroundColor:[C.green,C.red,C.slate],borderWidth:0}]},
    options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:true}},responsive:true,maintainAspectRatio:false}});
}
function barChart(canvas,labels,values,colors){
  new Chart(canvas,{type:'bar',data:{labels,datasets:[{data:values,backgroundColor:colors||PALETTE,borderRadius:6}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b'},grid:{display:false}},
      y:{ticks:{color:'#64748b'},grid:{color:'#e2e8f0'},beginAtZero:true}},responsive:true,maintainAspectRatio:false}});
}

function statusPill(rate){
  if(rate>=90)return `<span class="pill ok">${rate}% pass</span>`;
  if(rate>=70)return `<span class="pill warn">${rate}% pass</span>`;
  return `<span class="pill bad">${rate}% pass</span>`;
}

function buildCard(b){
  const card=el('div','card');
  const head=el('div','build-head');
  head.appendChild(el('div',null,
    `<div class="build-name">${b.label||b.build_tag}</div>
     <div class="muted">${b.platform} &middot; tag <code>${b.build_tag||'-'}</code></div>`));
  head.appendChild(el('div',null,statusPill(b.pass_rate||0)));
  card.appendChild(head);

  if(!b.found){
    card.appendChild(el('div','notice','Build not found for this tag.'));
    return card;
  }

  // donut + legend
  const dw=el('div','donut-wrap');dw.style.marginTop='12px';
  const dn=el('div','donut');
  const cv=el('canvas');dn.appendChild(cv);
  dn.appendChild(el('div','center',`<div class="pct">${b.pass_rate}%</div><div class="cl">pass</div>`));
  dw.appendChild(dn);
  dw.appendChild(el('div','legend',
    `<div><span class="dot" style="background:${C.green}"></span>Passed <b>${b.passed}</b></div>
     <div><span class="dot" style="background:${C.red}"></span>Failed <b>${b.failed}</b></div>
     <div><span class="dot" style="background:${C.slate}"></span>Other <b>${b.other}</b></div>
     <div style="margin-top:6px;color:var(--muted)">Total ${b.total} &middot; ${fmtDur(b.duration_sec)}</div>`));
  card.appendChild(dw);
  setTimeout(()=>donut(cv,b.passed,b.failed,b.other),0);

  // stability smart tags
  const st=b.smart_tags||{};
  if(Object.keys(st).length){
    const wrap=el('div','stab');
    const map={is_flaky:'Flaky',is_always_failing:'Always failing',is_new_failure:'New failures',is_performance_anomaly:'Perf anomaly'};
    for(const k in map){
      wrap.appendChild(el('div','b',`<div class="n">${st[k]??0}</div><div class="t">${map[k]}</div>`));
    }
    card.appendChild(wrap);
  }

  // device distribution
  if(b.devices && Object.keys(b.devices).length){
    const lbl=el('div','muted','Device distribution');lbl.style.marginTop='12px';card.appendChild(lbl);
    const box=el('div','chart-box');const dc=el('canvas');box.appendChild(dc);card.appendChild(box);
    const labels=Object.keys(b.devices),vals=Object.values(b.devices);
    setTimeout(()=>barChart(dc,labels,vals),0);
  }

  // top errors
  if(b.top_errors && b.top_errors.length){
    const t=el('div',null,`<div class="muted" style="margin-top:12px">Top failure clusters${b.unique_insight?` &middot; ${b.unique_insight}`:''}</div>`);
    const tbl=el('table');
    tbl.innerHTML='<tr><th>Impacted</th><th>Error</th></tr>'+b.top_errors.map(e=>{
      const first=(e.error||'').split('\n')[0];
      return `<tr><td class="num">${e.impacted??'-'}</td><td class="err" title="${(e.error||'').replace(/"/g,'&quot;')}">${first.replace(/</g,'&lt;')}</td></tr>`;
    }).join('');
    t.appendChild(tbl);card.appendChild(t);
  }

  // links
  const ll=el('div','linkline');
  if(b.public_url)ll.appendChild(linkBtn('Shareable build',b.public_url));
  if(b.observability_url)ll.appendChild(linkBtn('BS dashboard',b.observability_url));
  if(b.ci_url)ll.appendChild(linkBtn('Jenkins',b.ci_url));
  card.appendChild(ll);
  return card;
}

function uatPlatformBlock(roll){
  const frag=document.createDocumentFragment();
  frag.appendChild(buildCard(roll));
  const rc=el('div','card');
  rc.innerHTML=`<div class="build-name">${roll.platform} regional breakdown</div><div class="muted">Per-region pass/fail (UAT smoke)</div>`;
  const box2=el('div','chart-box');box2.style.height='220px';const rcv=el('canvas');box2.appendChild(rcv);rc.appendChild(box2);
  const regs=roll.regions||[];
  setTimeout(()=>{
    new Chart(rcv,{type:'bar',data:{labels:regs.map(r=>r.region),
      datasets:[{label:'Passed',data:regs.map(r=>r.passed),backgroundColor:C.green,borderRadius:5},
                {label:'Failed',data:regs.map(r=>r.failed),backgroundColor:C.red,borderRadius:5}]},
      options:{plugins:{legend:{labels:{color:'#64748b'}}},responsive:true,maintainAspectRatio:false,
        scales:{x:{stacked:true,ticks:{color:'#64748b'},grid:{display:false}},
                y:{stacked:true,beginAtZero:true,ticks:{color:'#64748b'},grid:{color:'#e2e8f0'}}}}});
  },0);
  const tbl=el('table');
  tbl.innerHTML='<tr><th>Region</th><th class="num">Pass</th><th class="num">Fail</th><th class="num">Rate</th><th>Link</th></tr>'+
    regs.map(r=>`<tr><td>${r.region}</td><td class="num">${r.passed}</td><td class="num">${r.failed}</td>
      <td class="num">${r.pass_rate}%</td>
      <td>${r.public_url?`<a class="inline" target="_blank" href="${r.public_url}">share</a>`:'-'}</td></tr>`).join('');
  rc.appendChild(tbl);
  frag.appendChild(rc);
  return frag;
}

function linkBtn(label,url){
  const a=el('a','btn',`&#128279; ${label}`);a.href=url;a.target='_blank';a.rel='noopener';return a;
}
function copyBtn(label,text){
  const b=el('span','btn',`&#128203; ${label}`);
  b.onclick=()=>{copy(text);const ok=el('span','copyok','copied');b.appendChild(ok);setTimeout(()=>ok.remove(),1200);};
  return b;
}

function render(){
  document.getElementById('rel').textContent=DATA.release;
  document.getElementById('meta').innerHTML=
    `Project <b>${DATA.project}</b> &middot; generated ${new Date(DATA.generated_at).toLocaleString()} &middot; live data from BrowserStack`;

  const tb=document.getElementById('topbtns');
  tb.appendChild(linkBtn('BrowserStack builds',DATA.bs_dashboard_url));
  tb.appendChild(linkBtn('Percy project',DATA.percy_project_url));

  // KPIs
  const s=DATA.summary;
  const kpis=document.getElementById('kpis');
  const cards=[
    ['Overall pass rate',`${s.pass_rate}%`, s.pass_rate>=90?'ok':(s.pass_rate>=70?'warn':'bad')],
    ['Total tests',`${s.total}`,'info'],
    ['Passed',`${s.passed}`,'ok'],
    ['Failed',`${s.failed}`,'bad'],
  ];
  cards.forEach(([l,v,k])=>{
    const c=el('div','card kpi');
    c.innerHTML=`<div class="lbl">${l}</div><div class="big">${v}</div><div><span class="pill ${k}">&nbsp;</span></div>`;
    kpis.appendChild(c);
  });
  // overall comparison bar
  const cmp=el('div','card');
  cmp.style.gridColumn='1 / -1';
  cmp.innerHTML='<div class="lbl">Pass rate by run</div>';
  const box=el('div','chart-box');const cc=el('canvas');box.appendChild(cc);cmp.appendChild(box);
  kpis.appendChild(cmp);
  const uatRollups=DATA.uat_rollups||[];
  const runs=[...DATA.qa,...uatRollups];
  const labels=runs.map(r=>r.label.replace(/ \(rollup,[^)]*\)/,' UAT'));
  const vals=runs.map(r=>r.pass_rate||0);
  const colors=vals.map(v=>v>=90?C.green:(v>=70?C.amber:C.red));
  setTimeout(()=>barChart(cc,labels,vals,colors),0);

  // QA
  const qa=document.getElementById('qa');
  DATA.qa.forEach(b=>qa.appendChild(buildCard(b)));

  // UAT - one rollup + regional breakdown per platform
  const uat=document.getElementById('uat');
  uatRollups.forEach(roll=>uat.appendChild(uatPlatformBlock(roll)));

  renderPercy();

  document.getElementById('footer').innerHTML=
    `Data fetched live from BrowserStack App Automate (TRA + REST). Percy section reflects token availability. &middot; ${DATA.release}`;
}

function diffGallery(b){
  const wrap=el('div','diffgal');
  (b.diffs||[]).forEach(d=>{
    const img=d.diff_url||d.head_url;
    const cell=el('a','diffcell');
    if(b.web_url){cell.href=b.web_url;cell.target='_blank';cell.rel='noopener';}
    if(img){
      const im=el('img','thumb');im.src=img;im.loading='lazy';im.alt=d.name;
      im.onclick=(e)=>{e.preventDefault();openLightbox(img,d.name);};
      cell.appendChild(im);
    }else{
      cell.appendChild(el('div','nodiff','new snapshot<br/>(no baseline)'));
    }
    const pct=(d.diff_ratio*100);
    const rt=d.is_new?`<span class="newbadge">NEW</span>`:`<span class="rt">${pct<0.01?'<0.01':pct.toFixed(2)}% diff</span>`;
    cell.appendChild(el('div','cap',`<span class="nm" title="${d.name}">${d.name}</span>${rt}`));
    wrap.appendChild(cell);
  });
  return wrap;
}

function percyFeatured(b){
  const c=el('div','card');
  const diffs=b.total_comparisons_diff??0;
  const rev=(b.review_state||'').replace(/_/g,' ');
  const revPill=diffs>0?`<span class="pill warn">${diffs} visual diff${diffs===1?'':'s'}</span>`
                       :`<span class="pill ok">no diffs</span>`;
  c.innerHTML=`<div class="build-head">
      <div><div class="build-name">${b.platform} &middot; latest diff build</div>
      <div class="muted">#${b.build_number||''} ${b.name||b.bs_tag||''} &middot; ${b.state||''}${rev?(' &middot; '+rev):''}</div></div>
      <div>${revPill}</div></div>
    <div class="stab">
      <div class="b"><div class="n">${b.total_snapshots??'-'}</div><div class="t">Snapshots</div></div>
      <div class="b"><div class="n" style="color:${diffs>0?C.amber:C.green}">${diffs}</div><div class="t">Visual diffs</div></div>
      <div class="b"><div class="n">${b.snapshots_unreviewed??'-'}</div><div class="t">Unreviewed</div></div>
    </div>`;
  if(b.diffs && b.diffs.length){
    const lbl=el('div','muted','Diff snapshots (click to enlarge, sorted by diff %)');
    lbl.style.marginTop='12px';
    c.appendChild(lbl);
    c.appendChild(diffGallery(b));
  }
  const ll=el('div','linkline');
  if(b.web_url)ll.appendChild(linkBtn('Review all diffs in Percy',b.web_url));
  if(b.bs_public_url)ll.appendChild(linkBtn('BrowserStack run',b.bs_public_url));
  c.appendChild(ll);
  return c;
}

function openLightbox(src,alt){
  let lb=document.getElementById('lightbox');
  if(!lb){lb=el('div','lightbox');lb.id='lightbox';lb.onclick=()=>lb.classList.remove('open');
    lb.appendChild(el('img'));document.body.appendChild(lb);}
  lb.querySelector('img').src=src;lb.querySelector('img').alt=alt||'';lb.classList.add('open');
}

function renderPercy(){
  const root=document.getElementById('percy');
  const p=DATA.percy||{};
  const v=p.visual||{};
  if(v.enabled && v.latest && (v.latest.iOS||v.latest.Android)){
    const lat=v.latest;
    // Release-scoped totals = latest diff build per platform only (not all 30-day builds).
    const io=lat.iOS||{}, an=lat.Android||{};
    const relDiffs=(io.total_comparisons_diff||0)+(an.total_comparisons_diff||0);
    const relSnaps=(io.total_snapshots||0)+(an.total_snapshots||0);
    const sum=el('div','muted');sum.style.margin='2px 0 12px';
    sum.innerHTML=`Release visual diffs <b style="color:var(--amber)">${relDiffs}</b> `+
      `(iOS ${io.total_comparisons_diff||0} + Android ${an.total_comparisons_diff||0}) &middot; `+
      `${relSnaps} snapshots &middot; latest diff build per platform`;
    root.appendChild(sum);
    const fg=el('div','grid cols');
    if(lat.iOS)fg.appendChild(percyFeatured(lat.iOS));
    if(lat.Android)fg.appendChild(percyFeatured(lat.Android));
    root.appendChild(fg);
  } else {
    let msg='Embedded Percy visual diffs require a Percy <b>read-only</b> or <b>full-access</b> project token in <code>.percy.env</code>, then re-run the generator.';
    if((v.reason||'')==='forbidden_token_scope')
      msg='The Percy token in <code>.percy.env</code> is <b>write-only</b> (SDK token) - the read API returned 403. '+
          'Open Percy &rarr; Project Settings &rarr; Token and copy the <b>read-only</b> or <b>full-access</b> token instead, then re-run the generator.';
    root.appendChild(el('div','notice',msg+' The BrowserStack runs that produced the Percy snapshots and the Percy project are linked below.'));
  }
  // Fallback only: when visual diffs can't be embedded, link the BS percy runs.
  if(!(v.enabled && v.latest && (v.latest.iOS||v.latest.Android))){
    const grid=el('div','grid percy-grid');grid.style.marginTop='14px';
    (p.bs_builds||[]).forEach(b=>{
      const c=el('div','card');
      c.innerHTML=`<div class="build-name">${b.platform} &middot; ${b.kind}</div>
        <div class="muted">tag <code>${b.build_tag}</code> &middot; ${b.status||'-'}</div>`;
      const ll=el('div','linkline');
      if(b.public_url)ll.appendChild(linkBtn('Shareable run',b.public_url));
      c.appendChild(ll);
      grid.appendChild(c);
    });
    root.appendChild(grid);
  }
  const ll=el('div','linkline');ll.style.marginTop='12px';
  ll.appendChild(linkBtn('Percy visual dashboard (iOS & Android diffs)',DATA.percy_project_url));
  root.appendChild(ll);
}

render();
</script>
</body>
</html>
